name: Build NeoDPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > neodpi.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: app/build/outputs/apk/release/*.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install customtkinter pystray pillow pyinstaller

      - name: Install MSYS2 & build byedpi.exe
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc

      - name: Patch proxy.c for Windows (remove SIGHUP)
        run: |
          python -c "
          import re
          with open('app/src/main/cpp/byedpi/proxy.c', 'r') as f:
              content = f.read()
          content = content.replace(
              'signal(SIGHUP, on_hup);',
              '#ifndef _WIN32\n    signal(SIGHUP, on_hup);\n    #endif'
          )
          with open('app/src/main/cpp/byedpi/proxy.c', 'w') as f:
              f.write(content)
          print('Patched proxy.c')
          "

      - name: Compile byedpi.exe
        shell: msys2 {0}
        run: |
          gcc -O2 -std=c99 -DFAKE_SUPPORT -DTIMEOUT_SUPPORT \
            app/src/main/cpp/byedpi/main.c \
            app/src/main/cpp/byedpi/proxy.c \
            app/src/main/cpp/byedpi/desync.c \
            app/src/main/cpp/byedpi/packets.c \
            app/src/main/cpp/byedpi/conev.c \
            app/src/main/cpp/byedpi/extend.c \
            app/src/main/cpp/byedpi/mpool.c \
            app/src/main/cpp/byedpi/win_service.c \
            -o windows/bin/byedpi.exe \
            -lws2_32 -liphlpapi -lmswsock

      - name: Build Windows EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name NeoDPI `
            --add-data "windows/bin/byedpi.exe;bin" `
            --add-data "app/src/main/assets/proxytest_strategies.list;assets" `
            --add-data "app/src/main/assets/proxytest_telegram.sites;assets" `
            --add-data "app/src/main/assets/proxytest_speedtest.sites;assets" `
            --paths "windows" `
            --hidden-import "core.proxy" `
            --hidden-import "core.preferences" `
            --hidden-import "core.updater" `
            --hidden-import "ui.main_window" `
            --hidden-import "ui.settings_window" `
            --hidden-import "ui.cmd_editor" `
            --hidden-import "ui.tray" `
            windows/main.py

      - name: Verify EXE was built
        run: |
          if (Test-Path "dist/NeoDPI.exe") {
            Write-Host "EXE built successfully: $((Get-Item dist/NeoDPI.exe).Length) bytes"
          } else {
            Write-Error "EXE not found!"
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/NeoDPI.exe

  release:
    name: Create Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: artifacts/android

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android/*.apk
            artifacts/windows/NeoDPI.exe
          generate_release_notes: true
